server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Knowledge repo topic pages — read-only bind-mount of /storage/knowledge.
  # Served as text so react-markdown can fetch and render them client-side.
  location /k/data/ {
    alias /knowledge/topics/;
    default_type text/markdown;
    add_header Cache-Control "no-cache";
  }

  # Knowledge research API — proxied to the knowledge-engine research container
  # (both containers share the network_public Docker network). The bearer
  # token is injected here, server-side, via a bind-mounted auth file — so it
  # never reaches the browser. /k is already gated by Traefik BasicAuth.
  #
  # Resolution is DEFERRED to request time: the upstream host is held in a
  # variable and resolved per-request via Docker's embedded DNS (127.0.0.11),
  # so nginx BOOTS CLEANLY even if that container is renamed, down, or absent —
  # the marketing site never hard-depends on it (only /k/api then 502s). This
  # replaces a bare `proxy_pass http://host/...`, which nginx resolves at boot
  # and which crash-looped the whole site when the research container was
  # renamed. Wildcard include: absent auth file still starts cleanly.
  location /k/api/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $research_upstream amiticia-knowledge-engine-research;
    rewrite ^/k/api/(.*)$ /api/$1 break;
    proxy_pass http://$research_upstream:39010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    include /etc/nginx/research-auth*.conf;
    proxy_connect_timeout 10s;
    proxy_read_timeout 180s;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
