server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Knowledge repo topic pages — read-only bind-mount of /storage/knowledge.
  # Served as text so react-markdown can fetch and render them client-side.
  location /k/data/ {
    alias /knowledge/topics/;
    default_type text/markdown;
    add_header Cache-Control "no-cache";
  }

  # Knowledge research API — proxied to the content-watcher research container
  # (both containers share the network_public Docker network). The bearer
  # token is injected here, server-side, via a bind-mounted auth file — so it
  # never reaches the browser. /k is already gated by Traefik BasicAuth.
  # Wildcard include: if the auth file is absent nginx still starts cleanly
  # (the upstream then answers 401 — the site itself stays up).
  location /k/api/ {
    proxy_pass http://content-watcher-research:39010/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    include /etc/nginx/research-auth*.conf;
    proxy_connect_timeout 10s;
    proxy_read_timeout 180s;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
